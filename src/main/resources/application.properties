# Profil de developpement, par defaut.
# On utilise le SGBD H2 en memoire vive
# Le contenu des tables est initialise par le fichier data.sql

# Le port sur lequel est lancee l'application web (8080 par defaut)
server.port=${PORT:8080}

# Encodage des scripts sql d'initialisation de la BD : data.sql, schema.sql
# cf. https://code.chamo.de/2017/04/21/spring-boot-jpa-encoding-data-sql/
spring.sql.init.encoding=UTF-8



# utiliser une base de fichiers (pas in-memory) et autoriser multi-processus
#spring.datasource.url=jdbc:h2:file:./data/pharmacie
#spring.datasource.username=sa
#spring.datasource.password=


# On initialise la BD (data.sql) APRES la creation du schema relationnel
spring.jpa.defer-datasource-initialization=true

# On telecharge les images (ressources statiques) dans le dossier /tmp/images
spring.web.resources.static-locations=classpath:/static/,file:/tmp

# --- CONNEXION A LA BASE DE DONNEES POSTGRESQL RENDER ---

# L'URL (On a remplacé postgresql:// par jdbc:postgresql:// et on a enlevé les identifiants de l'URL)
spring.datasource.url=jdbc:postgresql://dpg-d6m6usnkijhs73fqhlg0-a.frankfurt-postgres.render.com/pharmacie_euxu

# Tes identifiants
spring.datasource.username=pharmacie_euxu_user
spring.datasource.password=4Cf9u0V3YXg8iKrznwbRcChpcjC5vQpV

# --- CONFIGURATION HIBERNATE & POSTGRESQL ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# IMPORTANT : update permet de garder tes donnees a chaque redemarrage du serveur
spring.jpa.hibernate.ddl-auto=update

# Force l'exécution du fichier data.sql même sur PostgreSQL ! 
#spring.sql.init.mode=always
# Pour afficher les statistiques d'execution SQL dans les logs
#spring.jpa.properties.hibernate.generate_statistics=true
# Log slow queries
#spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=1

# Affichage par defaut des erreurs du serveur
server.error.whitelabel.enabled=true

# Activation de Swagger / OpenAPI en mode developpement
springdoc.api-docs.enabled=true
# Activation de l'interface Swagger UI en mode developpement
springdoc.swagger-ui.enabled=true


# La console H2 est activee automatiquement si on utilise Spring Boot Dev Tools
spring.h2.console.enabled=true
# L'URL par defaut de la console H2, customisable
#spring.h2.console.path=/h2-console
# Acces a la console depuis l'exterieur
spring.h2.console.settings.web-allow-others=true

# Configuration de la generation de JSON
spring.data.rest.defaultMediaType=application/json

# Pour generer du joli JSON
spring.jackson.serialization.indent-output=true

# L'API REST est exposee a l'url http://localhost:8080/api
spring.data.rest.base-path=api

# Configuration pour l'execution derriere un proxy (ex: Koyeb)
server.forward-headers-strategy=native

# Configuration des logs
server.error.include-stacktrace=never
logging.level.web=DEBUG
# Montrer le detail des parametres HTTP transmis dans les logs
spring.mvc.log-request-details=true
# cf. https://www.baeldung.com/sql-logging-spring-boot
# Configuration des logs
logging.level.org.springframework=INFO
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=false
logging.level.org.hibernate.type=ERROR
logging.level.comptoirs=INFO
logging.pattern.console=%clr(%-5p)  %cyan(%logger{15}) - %msg %n


# Configuration pour l'upload de fichiers
# Taille maximale d'un fichier (5 MB)
spring.servlet.multipart.max-file-size=5MB
# Taille maximale d'une requête (10 MB)
spring.servlet.multipart.max-request-size=10MB
# Activer le support multipart
spring.servlet.multipart.enabled=true
# Configuration de l'envoi de mails avec Gmail
spring.mail.host=smtp.sendgrid.com
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
